openapi: 3.1.2
info:
  title: SDKWork Forum App API
  version: 0.1.0
  summary: Authenticated app/client forum API.
  description: 'App API for user-facing forum clients. Protected operations use SDKWork
    dual-token security through generated SDK TokenManager integration.

    '
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
servers:
- url: /app/v3/api
tags:
- name: communication
paths:
  /forum/nodes/tree:
    get:
      tags:
      - communication
      summary: List forum node tree.
      operationId: nodes.tree.list
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-app-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_node
      x-sdkwork-permission: forum.nodes.read
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      responses:
        '200':
          description: Forum node tree.
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SdkWorkApiResponse'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      type: object
                      additionalProperties: false
                      required:
                      - items
                      - pageInfo
                      properties:
                        items:
                          type: array
                          items:
                            $ref: '#/components/schemas/ForumNode'
                        pageInfo:
                          $ref: '#/components/schemas/PageInfo'
        default:
          $ref: '#/components/responses/Problem'
  /forum/boards/{boardId}/topics:
    get:
      tags:
      - communication
      summary: List topics in a board.
      operationId: topics.list
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-app-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_topic
      x-sdkwork-permission: forum.topics.read
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      parameters:
      - $ref: '#/components/parameters/BoardId'
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Sort'
      - name: tag_slug
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Topic page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkListResponse'
        default:
          $ref: '#/components/responses/Problem'
  /forum/topics:
    post:
      tags:
      - communication
      summary: Create topic.
      operationId: topics.create
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-app-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_topic
      x-sdkwork-permission: forum.topics.create
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      x-sdkwork-idempotent: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForumTopicCreateCommand'
      responses:
        '201':
          description: Created topic.
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SdkWorkApiResponse'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      type: object
                      required:
                      - item
                      properties:
                        item:
                          $ref: '#/components/schemas/ForumTopic'
        default:
          $ref: '#/components/responses/Problem'
  /forum/topics/{topicId}:
    get:
      tags:
      - communication
      summary: Retrieve topic.
      operationId: topics.retrieve
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-app-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_topic
      x-sdkwork-permission: forum.topics.read
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      parameters:
      - $ref: '#/components/parameters/TopicId'
      responses:
        '200':
          description: Topic detail.
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SdkWorkApiResponse'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      type: object
                      required:
                      - item
                      properties:
                        item:
                          $ref: '#/components/schemas/ForumTopic'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags:
      - communication
      summary: Update topic.
      operationId: topics.update
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-app-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_topic
      x-sdkwork-permission: forum.topics.update
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      parameters:
      - $ref: '#/components/parameters/TopicId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForumTopicUpdateCommand'
      responses:
        '200':
          description: Updated topic.
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SdkWorkApiResponse'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      type: object
                      required:
                      - item
                      properties:
                        item:
                          $ref: '#/components/schemas/ForumTopic'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags:
      - communication
      summary: Delete topic.
      operationId: topics.delete
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-app-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_topic
      x-sdkwork-permission: forum.topics.delete
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      parameters:
      - $ref: '#/components/parameters/TopicId'
      responses:
        '204':
          description: Topic deleted.
        default:
          $ref: '#/components/responses/Problem'
  /forum/topics/{topicId}/replies:
    get:
      tags:
      - communication
      summary: List replies for a topic.
      operationId: topics.replies.list
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-app-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_topic_reply
      x-sdkwork-permission: forum.replies.read
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      parameters:
      - $ref: '#/components/parameters/TopicId'
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Reply page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags:
      - communication
      summary: Create reply.
      operationId: topics.replies.create
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-app-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_topic_reply
      x-sdkwork-permission: forum.replies.create
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      x-sdkwork-idempotent: true
      parameters:
      - $ref: '#/components/parameters/TopicId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForumReplyCreateCommand'
      responses:
        '201':
          description: Created reply.
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SdkWorkApiResponse'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      type: object
                      required:
                      - item
                      properties:
                        item:
                          $ref: '#/components/schemas/ForumReply'
        default:
          $ref: '#/components/responses/Problem'
  /forum/replies/{replyId}:
    patch:
      tags:
      - communication
      summary: Update reply.
      operationId: replies.update
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-app-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_topic_reply
      x-sdkwork-permission: forum.replies.update
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      parameters:
      - $ref: '#/components/parameters/ReplyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForumReplyUpdateCommand'
      responses:
        '200':
          description: Updated reply.
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SdkWorkApiResponse'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      type: object
                      required:
                      - item
                      properties:
                        item:
                          $ref: '#/components/schemas/ForumReply'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags:
      - communication
      summary: Delete reply.
      operationId: replies.delete
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-app-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_topic_reply
      x-sdkwork-permission: forum.replies.delete
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      parameters:
      - $ref: '#/components/parameters/ReplyId'
      responses:
        '204':
          description: Reply deleted.
        default:
          $ref: '#/components/responses/Problem'
  /forum/topics/{topicId}/revisions:
    get:
      tags:
      - communication
      summary: List topic revisions.
      operationId: topics.revisions.list
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-app-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_topic_revision
      x-sdkwork-permission: forum.topics.revisions.read
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      parameters:
      - $ref: '#/components/parameters/TopicId'
      responses:
        '200':
          description: Topic revisions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkListResponse'
        default:
          $ref: '#/components/responses/Problem'
  /forum/replies/{replyId}/revisions:
    get:
      tags:
      - communication
      summary: List reply revisions.
      operationId: replies.revisions.list
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-app-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_reply_revision
      x-sdkwork-permission: forum.replies.revisions.read
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      parameters:
      - $ref: '#/components/parameters/ReplyId'
      responses:
        '200':
          description: Reply revisions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkListResponse'
        default:
          $ref: '#/components/responses/Problem'
  /forum/questions/{topicId}/accepted_reply:
    put:
      tags:
      - communication
      summary: Accept a reply for a question topic.
      operationId: questions.acceptedReply.update
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-app-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_question_profile
      x-sdkwork-permission: forum.questions.accept
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      parameters:
      - $ref: '#/components/parameters/TopicId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - reply_id
              properties:
                replyId:
                  type: string
      responses:
        '200':
          description: Updated topic.
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SdkWorkApiResponse'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      type: object
                      required:
                      - item
                      properties:
                        item:
                          $ref: '#/components/schemas/ForumTopic'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags:
      - communication
      summary: Clear accepted reply for a question topic.
      operationId: questions.acceptedReply.delete
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-app-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_question_profile
      x-sdkwork-permission: forum.questions.accept
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      parameters:
      - $ref: '#/components/parameters/TopicId'
      responses:
        '204':
          description: Accepted reply cleared.
        default:
          $ref: '#/components/responses/Problem'
  /forum/polls/{pollId}/votes:
    post:
      tags:
      - communication
      summary: Vote in a poll.
      operationId: polls.votes.create
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-app-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_poll_vote
      x-sdkwork-permission: forum.polls.vote
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      parameters:
      - $ref: '#/components/parameters/PollId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - option_ids
              properties:
                optionIds:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Poll vote accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkResourceResponse'
        default:
          $ref: '#/components/responses/Problem'
  /forum/reactions:
    post:
      tags:
      - communication
      summary: Create or replace a reaction.
      operationId: reactions.create
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-app-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_reaction
      x-sdkwork-permission: forum.reactions.create
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForumReactionCommand'
      responses:
        '201':
          description: Reaction recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkResourceResponse'
        default:
          $ref: '#/components/responses/Problem'
  /forum/votes:
    post:
      tags:
      - communication
      summary: Create or replace a vote.
      operationId: votes.create
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-app-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_vote
      x-sdkwork-permission: forum.votes.create
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForumVoteCommand'
      responses:
        '201':
          description: Vote recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkResourceResponse'
        default:
          $ref: '#/components/responses/Problem'
  /forum/bookmarks:
    post:
      tags:
      - communication
      summary: Create or update a bookmark.
      operationId: bookmarks.create
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-app-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_bookmark
      x-sdkwork-permission: forum.bookmarks.update
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForumBookmarkCommand'
      responses:
        '201':
          description: Bookmark state updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkResourceResponse'
        default:
          $ref: '#/components/responses/Problem'
  /forum/read_state/topics/{topicId}:
    patch:
      tags:
      - communication
      summary: Mark topic read state.
      operationId: readState.topics.update
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-app-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_read_state
      x-sdkwork-permission: forum.readState.update
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      parameters:
      - $ref: '#/components/parameters/TopicId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lastReadReplyId:
                  type: string
                lastReadAt:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Read state updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkResourceResponse'
        default:
          $ref: '#/components/responses/Problem'
  /forum/reports:
    post:
      tags:
      - communication
      summary: Create a report.
      operationId: reports.create
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-app-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_report
      x-sdkwork-permission: forum.reports.create
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForumReportCommand'
      responses:
        '201':
          description: Report created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkResourceResponse'
        default:
          $ref: '#/components/responses/Problem'
  /forum/feed:
    get:
      tags:
      - communication
      summary: List personalized forum feed.
      operationId: feed.list
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-app-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_feed_item
      x-sdkwork-permission: forum.feed.read
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      parameters:
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      - name: feed_type
        in: query
        schema:
          type: string
          enum:
          - home
          - board
          - tag
          - member
      responses:
        '200':
          description: Feed page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkListResponse'
        default:
          $ref: '#/components/responses/Problem'
  /forum/search:
    get:
      tags:
      - communication
      summary: Search forum content.
      operationId: search.list
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-app-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_search_document
      x-sdkwork-permission: forum.search.read
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 200
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkListResponse'
        default:
          $ref: '#/components/responses/Problem'
components:
  securitySchemes:
    AuthToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
    AccessToken:
      type: apiKey
      in: header
      name: Access-Token
  parameters:
    BoardId:
      name: boardId
      in: path
      required: true
      schema:
        type: string
    TopicId:
      name: topicId
      in: path
      required: true
      schema:
        type: string
    ReplyId:
      name: replyId
      in: path
      required: true
      schema:
        type: string
    PollId:
      name: pollId
      in: path
      required: true
      schema:
        type: string
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
    Limit:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
    Sort:
      name: sort
      in: query
      schema:
        type: string
        enum:
        - latest
        - top
        - featured
        - created
  responses:
    Problem:
      description: Problem detail.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
  schemas:
    ProblemDetail:
      type: object
      additionalProperties: true
      required:
      - type
      - title
      - status
      - code
      - traceId
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
          type: integer
          minimum: 100
          maximum: 599
        detail:
          type: string
        instance:
          type: string
        code:
          $ref: '#/components/schemas/SdkWorkPlatformErrorCode'
        traceId:
          type: string
          format: uuid
          description: Server-owned request correlation id.
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
    CursorPage:
      type: object
      required:
      - items
      - nextCursor
      - hasMore
      properties:
        items:
          type: array
          items: true
        nextCursor:
          type:
          - string
          - 'null'
        hasMore:
          type: boolean
    MediaResource:
      type: object
      required:
      - id
      - kind
      properties:
        id:
          type: string
        kind:
          type: string
        fileName:
          type: string
        mimeType:
          type: string
        byteSize:
          type: string
        width:
          type: integer
        height:
          type: integer
    ForumNode:
      type: object
      required:
      - id
      - nodeType
      - slug
      - name
      - children
      properties:
        id:
          type: string
        parentId:
          type:
          - string
          - 'null'
        nodeType:
          type: string
          enum:
          - category
          - board
        slug:
          type: string
