      x-sdkwork-auth-mode: dual-token
      parameters:
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      - name: moderation_status
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Topic page.
          content:
            application/json:
              schema:
