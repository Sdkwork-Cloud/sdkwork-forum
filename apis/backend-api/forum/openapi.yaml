components:
  securitySchemes:
    AuthToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
    AccessToken:
      type: apiKey
      in: header
      name: Access-Token
  parameters:
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    NodeId:
      name: nodeId
      in: path
      required: true
      schema:
        type: string
    TopicId:
      name: topicId
      in: path
      required: true
      schema:
        type: string
    CaseId:
      name: caseId
      in: path
      required: true
      schema:
        type: string
    SanctionId:
      name: sanctionId
      in: path
      required: true
      schema:
        type: string
  responses:
    Problem:
      description: Problem detail.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
  schemas:
    ProblemDetail:
      type: object
      additionalProperties: true
      required:
      - type
      - title
      - status
      - code
      - traceId
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
          type: integer
          minimum: 100
          maximum: 599
        detail:
          type: string
        instance:
          type: string
        code:
          $ref: '#/components/schemas/SdkWorkPlatformErrorCode'
        traceId:
          type: string
          format: uuid
          description: Server-owned request correlation id.
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
    CursorPage:
      type: object
      required:
      - items
      - nextCursor
      - hasMore
      properties:
        items:
          type: array
          items: true
        nextCursor:
          type:
          - string
          - 'null'
        hasMore:
          type: boolean
    MediaResource:
      type: object
      required:
      - id
      - kind
      properties:
        id:
          type: string
        kind:
          type: string
        fileName:
          type: string
        mimeType:
          type: string
    ForumNode:
      type: object
      required:
      - id
      - nodeType
      - slug
      - name
      - status
      properties:
        id:
          type: string
        parentId:
          type:
          - string
          - 'null'
        nodeType:
          type: string
          enum:
          - category
          - board
        slug:
          type: string
        name:
          type: string
        status:
          type: string
    ForumBoard:
      type: object
      required:
      - id
      - slug
      - name
      - visibility
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
        visibility:
          type: string
    ForumTag:
      type: object
      required:
      - id
      - slug
      - name
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
    ForumTopicPrefix:
      type: object
      required:
      - id
