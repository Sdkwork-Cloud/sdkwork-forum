openapi: 3.1.2
info:
  title: SDKWork Forum Backend API
  version: 0.1.0
  summary: Backend-admin and operator forum API.
  description: 'Backend API for forum administration, moderation, taxonomy, reputation,
    statistics, search maintenance, and audit workflows.

    '
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
servers:
- url: /backend/v3/api
tags:
- name: communication
paths:
  /forum/nodes:
    get:
      tags:
      - communication
      summary: List forum nodes for administration.
      operationId: nodes.list
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-backend-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_node
      x-sdkwork-permission: forum.backend.nodes.read
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      parameters:
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Node page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags:
      - communication
      summary: Create forum node.
      operationId: nodes.create
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-backend-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_node
      x-sdkwork-permission: forum.backend.nodes.create
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForumNodeCommand'
      responses:
        '201':
          description: Created node.
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SdkWorkApiResponse'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      type: object
                      required:
                      - item
                      properties:
                        item:
                          $ref: '#/components/schemas/ForumNode'
        default:
          $ref: '#/components/responses/Problem'
  /forum/nodes/{nodeId}:
    patch:
      tags:
      - communication
      summary: Update forum node.
      operationId: nodes.update
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-backend-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_node
      x-sdkwork-permission: forum.backend.nodes.update
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      parameters:
      - $ref: '#/components/parameters/NodeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForumNodeCommand'
      responses:
        '200':
          description: Updated node.
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SdkWorkApiResponse'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      type: object
                      required:
                      - item
                      properties:
                        item:
                          $ref: '#/components/schemas/ForumNode'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags:
      - communication
      summary: Delete forum node.
      operationId: nodes.delete
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-backend-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_node
      x-sdkwork-permission: forum.backend.nodes.delete
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      parameters:
      - $ref: '#/components/parameters/NodeId'
      responses:
        '204':
          description: Node deleted.
        default:
          $ref: '#/components/responses/Problem'
  /forum/topic_prefixes:
    get:
      tags:
      - communication
      summary: List topic prefixes.
      operationId: topicPrefixes.list
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-backend-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_topic_prefix
      x-sdkwork-permission: forum.backend.topicPrefixes.read
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      parameters:
      - name: board_id
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Topic prefixes.
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SdkWorkApiResponse'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      type: object
                      additionalProperties: false
                      required:
                      - items
                      - pageInfo
                      properties:
                        items:
                          type: array
                          items:
                            $ref: '#/components/schemas/ForumTopicPrefix'
                        pageInfo:
                          $ref: '#/components/schemas/PageInfo'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags:
      - communication
      summary: Create topic prefix.
      operationId: topicPrefixes.create
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-backend-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_topic_prefix
      x-sdkwork-permission: forum.backend.topicPrefixes.create
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForumTopicPrefixCommand'
      responses:
        '201':
          description: Created prefix.
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SdkWorkApiResponse'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      type: object
                      required:
                      - item
                      properties:
                        item:
                          $ref: '#/components/schemas/ForumTopicPrefix'
        default:
          $ref: '#/components/responses/Problem'
  /forum/topics:
    get:
      tags:
      - communication
      summary: Search and list topics for operators.
      operationId: topics.list
      security:
      - AuthToken: []
        AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-backend-api
      x-sdkwork-domain: communication
