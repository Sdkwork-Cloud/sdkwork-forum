schemaVersion: 1
kind: sdkwork.job.schedule
owner: sdkwork-forum
domain: communication
capability: forum
schedules:
  - name: forum-stats-rebuild-nightly
    cron: "0 3 * * *"
    job: RebuildStats
    description: "Recalculate topic, board, member, and tag counters from source tables. Rebuilds forum_topic_stats, forum_board_stats, forum_member_stats, and tag usage_count projections from authoritative source data."
    timeout: 7200
  - name: forum-search-repair-hourly
    cron: "0 * * * *"
    job: RebuildSearchProjection
    description: "Repair failed or stale forum_search_document rows. Re-indexes documents with index_status=failed or stale source_version, and reconciles with external search index."
    timeout: 1800
