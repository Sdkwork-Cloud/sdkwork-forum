components:
  securitySchemes:
    AuthToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
    AccessToken:
      type: apiKey
      in: header
      name: Access-Token
  parameters:
    Cursor:
      name: cursor
      in: query
      schema: { type: string }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    NodeId:
      name: nodeId
      in: path
      required: true
      schema: { type: string }
    TopicId:
      name: topicId
      in: path
      required: true
      schema: { type: string }
    CaseId:
      name: caseId
      in: path
      required: true
      schema: { type: string }
    SanctionId:
      name: sanctionId
      in: path
      required: true
      schema: { type: string }
  responses:
    Problem:
      description: Problem detail.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
  schemas:
    ProblemDetail:
      type: object
      required: [type, title, status]
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        code: { type: string }
    CursorPage:
      type: object
      required: [items, next_cursor, has_more]
      properties:
        items: { type: array, items: true }
        next_cursor: { type: [string, "null"] }
        has_more: { type: boolean }
    MediaResource:
      type: object
      required: [id, kind]
      properties:
        id: { type: string }
        kind: { type: string }
        file_name: { type: string }
        mime_type: { type: string }
    ForumNode:
      type: object
      required: [id, node_type, slug, name, status]
      properties:
        id: { type: string }
        parent_id: { type: [string, "null"] }
        node_type: { type: string, enum: [category, board] }
        slug: { type: string }
        name: { type: string }
        status: { type: string }
    ForumBoard:
      type: object
      required: [id, slug, name, visibility]
      properties:
        id: { type: string }
        slug: { type: string }
        name: { type: string }
        visibility: { type: string }
    ForumTag:
      type: object
      required: [id, slug, name]
      properties:
        id: { type: string }
        slug: { type: string }
        name: { type: string }
    ForumTopicPrefix:
      type: object
      required: [id, code, label]
      properties:
        id: { type: string }
        code: { type: string }
        label: { type: string }
        color: { type: string }
    ForumTopic:
      type: object
      required: [id, board_id, title, moderation_status, updated_at]
      properties:
        id: { type: string }
        board_id: { type: string }
        title: { type: string }
        body: { type: string }
        moderation_status: { type: string }
        updated_at: { type: string, format: date-time }
    ForumReply:
      type: object
      required: [id, topic_id, body, moderation_status]
      properties:
        id: { type: string }
        topic_id: { type: string }
        body: { type: string }
        moderation_status: { type: string }
    ForumFeedItem:
      type: object
      required: [id, topic_id, activity_at]
      properties:
        id: { type: string }
        topic_id: { type: string }
        activity_at: { type: string, format: date-time }
    ForumPublicTopic:
      type: object
      required: [id, title, excerpt]
      properties:
        id: { type: string }
        title: { type: string }
        excerpt: { type: string }
    ForumReportCommand:
      type: object
      required: [target_type, target_id, reason_code]
      properties:
        target_type: { type: string }
        target_id: { type: string }
        reason_code: { type: string }
    ForumModerationCase:
      type: object
      required: [id, case_no, case_status]
      properties:
        id: { type: string }
        case_no: { type: string }
        case_status: { type: string }
        target_type: { type: string }
        target_id: { type: string }
    ForumModerationDecisionCommand:
      type: object
      required: [decision_action, reason_code]
      properties:
        decision_action: { type: string }
        reason_code: { type: string }
        note: { type: string }
    ForumModerationDecision:
      type: object
      required: [id, decision_action, reason_code]
      properties:
        id: { type: string }
        decision_action: { type: string }
        reason_code: { type: string }
    ForumNodeCommand:
      type: object
      required: [node_type, slug, name]
      properties:
        parent_id: { type: string }
        node_type: { type: string, enum: [category, board] }
        slug: { type: string }
        name: { type: string }
        description: { type: string }
    ForumTopicPrefixCommand:
      type: object
      required: [board_id, code, label]
      properties:
        board_id: { type: string }
        code: { type: string }
        label: { type: string }
        color: { type: string }
    ForumTopicAdminCommand:
      type: object
      properties:
        title: { type: string }
        moderation_status: { type: string }
        visibility: { type: string }
    ForumNodePage:
      allOf:
        - $ref: "#/components/schemas/CursorPage"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/ForumNode"
    ForumTopicPage:
      allOf:
        - $ref: "#/components/schemas/CursorPage"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/ForumTopic"
    ForumModerationQueuePage:
      allOf:
        - $ref: "#/components/schemas/CursorPage"
        - type: object
          properties:
            items:
              type: array
              items:
                type: object
                additionalProperties: true
    ForumModerationCasePage:
      allOf:
        - $ref: "#/components/schemas/CursorPage"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/ForumModerationCase"
