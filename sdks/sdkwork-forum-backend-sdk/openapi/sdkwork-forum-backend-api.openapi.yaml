openapi: 3.1.2
info:
  title: SDKWork Forum Backend API
  version: 0.1.0
  summary: Backend-admin and operator forum API.
  description: >
    Backend API for forum administration, moderation, taxonomy, reputation,
    statistics, search maintenance, and audit workflows.
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
servers:
  - url: /backend/v3/api
tags:
  - name: forum.admin.nodes
  - name: forum.admin.topics
  - name: forum.admin.moderation
  - name: forum.admin.members
  - name: forum.admin.stats
  - name: forum.admin.search
  - name: forum.admin.audit
paths:
  /forum/nodes:
    get:
      tags: [forum.admin.nodes]
      summary: List forum nodes for administration.
      operationId: nodes.list
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-backend-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_node
      x-sdkwork-permission: forum.backend.nodes.read
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Node page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForumNodePage"
        default:
          $ref: "#/components/responses/Problem"
    post:
      tags: [forum.admin.nodes]
      summary: Create forum node.
      operationId: nodes.create
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-backend-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_node
      x-sdkwork-permission: forum.backend.nodes.create
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForumNodeCommand"
      responses:
        "201":
          description: Created node.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForumNode"
        default:
          $ref: "#/components/responses/Problem"
  /forum/nodes/{nodeId}:
    patch:
      tags: [forum.admin.nodes]
      summary: Update forum node.
      operationId: nodes.update
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-backend-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_node
      x-sdkwork-permission: forum.backend.nodes.update
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      parameters:
        - $ref: "#/components/parameters/NodeId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForumNodeCommand"
      responses:
        "200":
          description: Updated node.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForumNode"
        default:
          $ref: "#/components/responses/Problem"
    delete:
      tags: [forum.admin.nodes]
      summary: Delete forum node.
      operationId: nodes.delete
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-backend-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_node
      x-sdkwork-permission: forum.backend.nodes.delete
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      parameters:
        - $ref: "#/components/parameters/NodeId"
      responses:
        "204":
          description: Node deleted.
        default:
          $ref: "#/components/responses/Problem"
  /forum/topic_prefixes:
    get:
      tags: [forum.admin.nodes]
      summary: List topic prefixes.
      operationId: topicPrefixes.list
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-backend-api
      x-sdkwork-domain: communication
