      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForumTopicAdminCommand"
      responses:
        "200":
          description: Updated topic.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForumTopic"
        default:
          $ref: "#/components/responses/Problem"
    delete:
      tags: [forum.admin.topics]
      summary: Delete topic as operator.
      operationId: topics.delete
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-backend-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_topic
      x-sdkwork-permission: forum.backend.topics.delete
      x-sdkwork-tenant-scope: tenant
      x-sdkwork-auth-mode: dual-token
      parameters:
