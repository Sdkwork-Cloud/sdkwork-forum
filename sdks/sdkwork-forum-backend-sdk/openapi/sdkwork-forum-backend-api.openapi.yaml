    patch:
      tags: [forum.admin.topics]
      summary: Update topic as operator.
      operationId: topics.update
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-owner: sdkwork-forum
      x-sdkwork-api-authority: sdkwork-forum-backend-api
      x-sdkwork-domain: communication
      x-sdkwork-resource: forum_topic
      x-sdkwork-permission: forum.backend.topics.update
